{% comment %}Renderiza los campos de un form en grid. Pasa: form{% endcomment %}
<div class="form-grid">
  {% for field in form %}
    <div class="form-row {% if field.field.widget.input_type == 'textarea' or field.name in 'historia,objetivos,descripcion,notas,competencia,referencias,publico_objetivo,comentarios' %}full{% endif %}">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}<span class="helptext">{{ field.help_text }}</span>{% endif %}
      {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
    </div>
  {% endfor %}
</div>
